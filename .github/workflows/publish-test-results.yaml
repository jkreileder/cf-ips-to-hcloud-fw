name: Publish test results

on:
  workflow_run:
    workflows:
      - Build, sign, and publish Python package
    types:
      - completed

permissions:
  contents: read

# workflow_run runs on the default-branch ref, so group by the *triggering*
# run's branch — otherwise unrelated builds finishing together would cancel
# each other's result publish.
concurrency:
  group: ${{ github.workflow }}-${{ github.event.workflow_run.head_branch }}
  cancel-in-progress: true

jobs:
  publish-test-results:
    name: Publish test results
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: ${{ github.event.workflow_run.conclusion != 'skipped' }}

    permissions:
      checks: write
      pull-requests: write
      actions: read

    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          disable-sudo: true
          egress-policy: block
          allowed-endpoints: >
            api.github.com:443

      - name: Download artifacts
        uses: dawidd6/action-download-artifact@b6e2e70617bc3265edd6dab6c906732b2f1ae151 # v21
        with:
          run_id: ${{ github.event.workflow_run.id }}
          name: test-results-.*|event-file
          name_is_regexp: true
          path: artifacts

      - name: Publish test results
        uses: EnricoMi/publish-unit-test-result-action@c950f6fb443cb5af20a377fd0dfaa78838901040 # v2.23.0
        with:
          commit: ${{ github.event.workflow_run.head_sha }}
          event_file: artifacts/event-file/event.json
          event_name: ${{ github.event.workflow_run.event }}
          files: artifacts/test-results-*/*.xml
          comment_mode: ${{ github.event.workflow_run.event == 'pull_request' && 'always' || 'off' }}
          report_individual_runs: true
          check_run_annotations_branch: "*"
