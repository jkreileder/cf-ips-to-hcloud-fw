repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: 3e8a8703264a2f4a69428a0aa4dcb512790b2c8c  # frozen: v6.0.0
    hooks:
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: mixed-line-ending
        args: [--fix=lf]
      - id: check-merge-conflict
      - id: check-case-conflict
      - id: check-toml
      - id: pretty-format-json
        args: [--autofix, --indent=4]
  - repo: https://github.com/astral-sh/uv-pre-commit
    rev: 73c2d77a42a113aee9e4b748c24937f09557b82d  # frozen: 0.11.24
    hooks:
      - id: uv-lock
        args: [--check]
  # ruff and ty run from the project venv (uv.lock) for parity with `make lint`
  # and CI — the locked versions are the single source of truth. ruff in
  # particular runs with `preview = true`, whose rules/formatting are
  # version-sensitive, so an independently pinned hook could disagree with CI.
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check
        entry: uv run ruff check --fix --exit-non-zero-on-fix
        language: system
        types_or: [python, pyi]
        require_serial: true
      - id: ruff-format
        name: ruff format
        entry: uv run ruff format
        language: system
        types_or: [python, pyi]
        require_serial: true
      - id: ty
        name: ty check
        entry: uv run ty check
        language: system
        types: [python]
        pass_filenames: false
        require_serial: true
  - repo: https://github.com/gitleaks/gitleaks
    rev: 83d9cd684c87d95d656c1458ef04895a7f1cbd8e  # frozen: v8.30.1
    hooks:
      - id: gitleaks
  - repo: https://github.com/DavidAnson/markdownlint-cli2
    rev: 996abf60411a8d954288ac9856aae7602b80cbda  # frozen: v0.22.1
    hooks:
      - id: markdownlint-cli2
  - repo: https://github.com/rhysd/actionlint
    rev: 914e7df21a07ef503a81201c76d2b11c789d3fca  # frozen: v1.7.12
    hooks:
      # Lints GitHub Actions workflows; runs shellcheck on run: blocks when
      # shellcheck is on PATH (CI's ubuntu runner ships it). Degrades to
      # YAML/expression checks otherwise.
      - id: actionlint
  - repo: https://github.com/zizmorcore/zizmor-pre-commit
    rev: e3eebf65325ccc992422292cb7a4baee967cf815  # frozen: v1.26.1
    hooks:
      # Security audit of GitHub Actions workflows (template injection,
      # credential persistence, cache poisoning, ...); complements actionlint,
      # which checks correctness.
      - id: zizmor
  - repo: https://github.com/renovatebot/pre-commit-hooks
    rev: ea931ccc70c472cfeb2f822acba7f0e12b7842ce  # frozen: 43.243.1
    hooks:
      - id: renovate-config-validator
        args: [--strict]
